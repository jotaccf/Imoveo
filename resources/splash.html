<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Imoveo</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0D1B1A;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      overflow: hidden;
      -webkit-app-region: drag;
      user-select: none;
    }

    .logo {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
    }

    .app-name {
      color: #ffffff;
      font-size: 28px;
      font-weight: 600;
      letter-spacing: 1.5px;
    }

    .status {
      color: #5DCAA5;
      font-size: 12px;
      margin-top: 4px;
      letter-spacing: 0.5px;
    }

    .progress-container {
      position: absolute;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 3px;
      background: rgba(29, 158, 117, 0.15);
    }

    .progress-bar {
      height: 100%;
      width: 30%;
      background: linear-gradient(90deg, #1D9E75, #5DCAA5);
      border-radius: 0 2px 2px 0;
      animation: progress 1.8s ease-in-out infinite;
    }

    @keyframes progress {
      0%   { transform: translateX(-100%); width: 30%; }
      50%  { width: 50%; }
      100% { transform: translateX(400%); width: 30%; }
    }
  </style>
</head>
<body>
  <div class="logo">
    <svg width="80" height="80" viewBox="0 0 52 52" fill="none" xmlns="http://www.w3.org/2000/svg">
      <rect width="52" height="52" rx="11.44" fill="#1D9E75" />
      <path d="M14 36V22L26 13L38 22V36" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none" />
      <rect x="21" y="28" width="10" height="8" stroke="white" stroke-width="2.5" fill="none" />
      <circle cx="38" cy="16" r="5" fill="#0F6E56" stroke="white" stroke-width="1.5" />
      <line x1="38" y1="13.5" x2="38" y2="18.5" stroke="white" stroke-width="1.2" />
      <line x1="35.5" y1="16" x2="40.5" y2="16" stroke="white" stroke-width="1.2" />
    </svg>
    <span class="app-name">imoveo</span>
    <span class="status">A iniciar...</span>
  </div>
  <div class="progress-container">
    <div class="progress-bar"></div>
  </div>
</body>
</html>
