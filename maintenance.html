<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Imoveo — Actualizacao em curso</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0D1B1A;
      color: #E5E7EB;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .container {
      max-width: 680px;
      width: 100%;
      padding: 40px;
    }
    .header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 32px;
    }
    .logo {
      width: 36px;
      height: 36px;
      background: #1D9E75;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 16px;
      color: white;
    }
    .brand { font-size: 20px; font-weight: 600; color: white; }
    .brand span { color: #5DCAA5; font-size: 12px; font-weight: 400; display: block; }
    h1 {
      font-size: 22px;
      font-weight: 600;
      color: white;
      margin-bottom: 8px;
    }
    .subtitle {
      font-size: 14px;
      color: #9CA3AF;
      margin-bottom: 24px;
    }
    .status-bar {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px 16px;
      background: #1a2e2c;
      border: 1px solid #2d4a46;
      border-radius: 8px;
      margin-bottom: 20px;
    }
    .spinner {
      width: 18px;
      height: 18px;
      border: 2px solid #2d4a46;
      border-top-color: #1D9E75;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    .done-icon {
      width: 18px;
      height: 18px;
      background: #1D9E75;
      border-radius: 50%;
      display: none;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      color: white;
      font-weight: 700;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .status-text { font-size: 13px; color: #5DCAA5; }
    .log-container {
      background: #111E1D;
      border: 1px solid #1a2e2c;
      border-radius: 8px;
      overflow: hidden;
    }
    .log-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 16px;
      background: #1a2e2c;
      font-size: 11px;
      color: #6B7280;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    .log-body {
      padding: 14px 16px;
      max-height: 320px;
      overflow-y: auto;
      font-family: 'Cascadia Code', 'Fira Code', 'Consolas', monospace;
      font-size: 12px;
      line-height: 1.7;
      color: #9CA3AF;
      white-space: pre-wrap;
      word-break: break-all;
    }
    .log-body .line-new { color: #5DCAA5; }
    .log-body .line-error { color: #E24B4A; }
    .log-body .line-warn { color: #E5C07B; }
    .success-banner {
      display: none;
      padding: 14px 16px;
      background: #0F2E24;
      border: 1px solid #1D9E75;
      border-radius: 8px;
      margin-top: 20px;
      text-align: center;
    }
    .success-banner h3 { font-size: 15px; color: #1D9E75; margin-bottom: 4px; }
    .success-banner p { font-size: 12px; color: #5DCAA5; }
    .success-banner .redirect { font-size: 11px; color: #6B7280; margin-top: 8px; }
    .footer {
      margin-top: 32px;
      text-align: center;
      font-size: 11px;
      color: #4B5563;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <div class="logo">i</div>
      <div class="brand">imoveo<span>gestao patrimonial</span></div>
    </div>

    <h1>Actualizacao em curso</h1>
    <p class="subtitle">O sistema esta a ser actualizado. Por favor aguarde.</p>

    <div class="status-bar">
      <div class="spinner" id="spinner"></div>
      <div class="done-icon" id="doneIcon">&#10003;</div>
      <span class="status-text" id="statusText">A actualizar...</span>
    </div>

    <div class="log-container">
      <div class="log-header">
        <span>Registo de actualizacao</span>
        <span id="logTime">—</span>
      </div>
      <div class="log-body" id="logBody">A aguardar logs...</div>
    </div>

    <div class="success-banner" id="successBanner">
      <h3>Actualizacao concluida com sucesso</h3>
      <p id="versionInfo"></p>
      <p class="redirect">A redirecionar em <span id="countdown">5</span> segundos...</p>
    </div>

    <div class="footer">
      Imoveo &mdash; O sistema ira reiniciar automaticamente
    </div>
  </div>

  <script>
    const logBody = document.getElementById('logBody');
    const logTime = document.getElementById('logTime');
    const statusText = document.getElementById('statusText');
    const spinner = document.getElementById('spinner');
    const doneIcon = document.getElementById('doneIcon');
    const successBanner = document.getElementById('successBanner');
    let completed = false;
    let prevLogLength = 0;

    function formatLine(line) {
      if (!line.trim()) return '';
      if (line.includes('Error') || line.includes('error') || line.includes('FATAL')) {
        return '<span class="line-error">' + escapeHtml(line) + '</span>';
      }
      if (line.includes('WARNING') || line.includes('warning')) {
        return '<span class="line-warn">' + escapeHtml(line) + '</span>';
      }
      return '<span class="line-new">' + escapeHtml(line) + '</span>';
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    async function fetchLogs() {
      try {
        const res = await fetch('/maintenance/update.log?t=' + Date.now());
        if (res.ok) {
          const text = await res.text();
          if (text.length > prevLogLength) {
            const lines = text.trim().split('\n');
            logBody.innerHTML = lines.map(formatLine).join('\n');
            logBody.scrollTop = logBody.scrollHeight;
            prevLogLength = text.length;
            logTime.textContent = new Date().toLocaleTimeString('pt-PT');

            // Detectar conclusao
            if (text.includes('Actualizacao concluida') || text.includes('actualizacao concluida')) {
              statusText.textContent = 'Actualizacao concluida. A verificar aplicacao...';
            }
          }
        }
      } catch { /* log file not available yet */ }
    }

    async function checkApp() {
      if (completed) return;
      try {
        const res = await fetch('/api/health?t=' + Date.now());
        if (res.ok) {
          const data = await res.json();
          if (data.status === 'ok') {
            completed = true;
            spinner.style.display = 'none';
            doneIcon.style.display = 'flex';
            statusText.textContent = 'Sistema operacional';
            statusText.style.color = '#1D9E75';
            successBanner.style.display = 'block';

            // Obter versao
            try {
              const vRes = await fetch('/api/admin/version');
              const vData = await vRes.json();
              if (vData.data) {
                document.getElementById('versionInfo').textContent =
                  'Versao: v' + vData.data.currentVersion;
              }
            } catch {}

            // Countdown e redirect
            let count = 5;
            const countdownEl = document.getElementById('countdown');
            const iv = setInterval(() => {
              count--;
              countdownEl.textContent = count;
              if (count <= 0) {
                clearInterval(iv);
                window.location.href = '/dashboard';
              }
            }, 1000);
          }
        }
      } catch { /* app still restarting */ }
    }

    // Poll logs every 3s, check app every 5s
    fetchLogs();
    setInterval(fetchLogs, 3000);
    setInterval(checkApp, 5000);
  </script>
</body>
</html>
